<!DOCTYPE html>
<html>
<head>
  <title>Buy Treasure Tempest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav>
    <div class="nav-logo">Treasure Tempest</div>
    <div>
      <a href="index.html">Home</a>
      <a href="howtoplay.html">How to Play</a>
      <a href="lore.html">Lore</a>
      <a href="buy.html">Buy Now</a>
    </div>
  </nav>

  <div class="section">

    <h1 class="main-title">Buy Treasure Tempest</h1>

    <p style="max-width:700px; margin:0 auto; font-size:20px;">
      Secure your copy of Treasure Tempest instantly below.
    </p>

    <br><br>

    <!-- STRIPE BUY BUTTON -->
    <a href="https://buy.stripe.com/5kQ5kw5vSeBa5iEg8waVa00" target="_blank" class="buy-button">
      Buy Now
    </a>

    <br><br><br>

    <p style="max-width:700px; margin:0 auto; font-size:18px;">
      Have questions about the game, shipping, or anything else? Send us a message below.
    </p>

    <br><br>

    <!-- CONTACT FORM -->
    <form action="https://formspree.io/f/mqewwobz" method="POST">

      <input type="text" name="name" placeholder="Your Name" required><br><br>

      <input type="email" name="email" placeholder="Your Email" required><br><br>

      <textarea name="message" placeholder="Ask any questions about Treasure Tempest..." rows="5" required></textarea><br><br>

      <button type="submit" class="buy-button">Send Message</button>

    </form>

  </div>

  <!-- COIN EFFECT SCRIPT -->
  <script>
    const targets = document.querySelectorAll(".nav-logo, nav a");
    let coinInterval;

    function makeCoin(target) {
      const coin = document.createElement("span");
      coin.classList.add("coin");
      coin.textContent = "●";

      const rect = target.getBoundingClientRect();

      const randomLeft = rect.left + Math.random() * rect.width;
      coin.style.left = randomLeft + "px";
      coin.style.top = rect.top - 30 + "px";

      document.body.appendChild(coin);

      setTimeout(() => {
        coin.remove();
      }, 1100);
    }

    targets.forEach(target => {
      target.addEventListener("mouseenter", () => {
        coinInterval = setInterval(() => makeCoin(target), 120);
      });

      target.addEventListener("mouseleave", () => {
        clearInterval(coinInterval);
      });
    });
  </script>

</body>
</html>
